version: 0.0.2
type: plugin
author: "xiang"
name: "github_tools"
label:
  en_US: "GitHub Tools"
  zh_Hans: "GitHub 工具箱"
created_at: "2025-06-27T08:00:00Z"
icon: icon.svg
description:
  en_US: A plugin for searching GitHub repositories, viewing README, listing issues, and getting repository info. No paid API key required.
  zh_Hans: 一个用于搜索 GitHub 仓库、查看 README、列出 Issue、获取仓库详情的插件。无需付费 API Key。
privacy_policy: "PRIVACY.md"
tags:
  - "other"
  - "productivity"
resource:
  memory: 1048576
  permission:
    tool:
      enabled: true
plugins:
  tools:
    - "provider/github.yaml"
meta:
  version: 0.0.1
  arch:
    - "amd64"
    - "arm64"
  runner:
    language: "python"
    version: "3.12"
    entrypoint: "main"
