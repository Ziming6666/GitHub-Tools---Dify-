identity:
  name: get_repo_info
  author: "xiang"
  label:
    en_US: Get Repository Info
    zh_Hans: 获取仓库详情
description:
  human:
    en_US: Get detailed information about a GitHub repository including stars, forks, language, license, topics, and recent activity.
    zh_Hans: 获取 GitHub 仓库的详细信息，包括 Star数、Fork数、编程语言、许可证、主题标签和近期活动。
  llm: Get detailed information about a GitHub repository including stars, forks, language, license, topics, and recent activity.
parameters:
  - name: repo
    type: string
    required: true
    label:
      en_US: Repository
      zh_Hans: 仓库
    human_description:
      en_US: Repository name in format 'owner/repo', e.g. 'langgenius/dify'
      zh_Hans: 仓库名称，格式为 'owner/repo'，例如 'langgenius/dify'
    llm_description: Repository name in format 'owner/repo', e.g. 'langgenius/dify'
    form: llm
extra:
  python:
    source: tools/get_repo_info.py
